name: OCI Instance Provisioning-jinlee

on:
  workflow_dispatch:
  schedule:
    - cron: '2-59/5 * * * *' # 👈 기존 것과 겹치지 않게 2분 뒤부터 시작하도록 설정

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: hitrov/oci-arm-host-capacity

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-progress

      - name: Create private key file
        run: echo "${{ secrets.OCI_KEY_CONTENT }}" > oci_private_key.pem

      - name: Run Provisioning Script
        id: run_script
        run: |
          OUTPUT=$(php index.php)
          echo "$OUTPUT"
          if [[ "$OUTPUT" == *"Instance OCID"* ]]; then
            echo "INSTANCE_CREATED=true" >> $GITHUB_OUTPUT
          else
            echo "INSTANCE_CREATED=false" >> $GITHUB_OUTPUT
          fi
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: oci_private_key.pem
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

      - name: Send Telegram Notification
        if: steps.run_script.outputs.INSTANCE_CREATED == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage \
            -d chat_id=$TELEGRAM_CHAT_ID \
            -d text="🎉 [성공] 오라클 ARM 서버(Jinlee)가 생성되었습니다!"
