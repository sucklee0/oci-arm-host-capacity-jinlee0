name: OCI Instance Provisioning

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # 5분마다 자동 실행

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      # 💡 [수정] composer json이 없으므로 무의미한 composer install 단계를 삭제했습니다.

      - name: Create private key file
        run: |
          echo "${{ secrets.OCI_KEY_CONTENT }}" > oci_private_key.pem
          chmod 600 oci_private_key.pem

      - name: Run Provisioning Script
        id: run_script
        run: |
          # 💡 [핵심] 파일이 없으면 기존 레포지토리(sucklee0/oci-arm-host-capacity)의 최신 소스코드를 다운로드해서 압축을 풉니다.
          if [ ! -f "index.php" ]; then
            echo "📦 기존 레포지토리에서 소스 코드를 원격으로 가져옵니다..."
            curl -L https://github.com/sucklee0/oci-arm-host-capacity/archive/refs/heads/main.tar.gz | tar -xz --strip-components=1
          fi
          
          # PHP가 실패 코드(exit 1)를 던져도 워크플로우가 멈추지 않도록 || true를 붙입니다.
          OUTPUT=$(php index.php 2>&1) || true
          echo "$OUTPUT"
          
          # 출력 결과물에 실제 성공 식별자인 'ocid1.instance'가 있는지 정확히 판별합니다.
          if [[ "$OUTPUT" == *"ocid1.instance"* ]]; then
            echo "INSTANCE_CREATED=true" >> $GITHUB_OUTPUT
          else
            echo "INSTANCE_CREATED=false" >> $GITHUB_OUTPUT
          fi
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: oci_private_key.pem
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

      - name: Send Telegram Notification
        # 실제 인스턴스가 성공적으로 생성되었을 때만 실행됩니다.
        if: steps.run_script.outputs.INSTANCE_CREATED == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage \
            -d chat_id=$TELEGRAM_CHAT_ID \
            -d text="🎉 [오라클 클라우드] ARM 인스턴스가 진짜로 생성되었습니다! 콘솔을 확인하세요."
